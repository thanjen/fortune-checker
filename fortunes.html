<html lang="ja">

<style>
  :root {
    --ink: #1a1a2e;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --cream: #faf8f3;
    --muted: #6b6b7a;
    --border: rgba(201,168,76,0.25);
    --surface: rgba(255,255,255,0.7);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--cream); color: var(--ink);
    font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 300;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(201,168,76,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(201,168,76,0.06) 0%, transparent 60%);
  }
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .star {
    position: absolute; width: 2px; height: 2px;
    background: var(--gold); border-radius: 50%; opacity: 0;
    animation: twinkle var(--d, 3s) var(--delay, 0s) infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; } 50% { opacity: var(--op, 0.6); }
  }
  .wrap {
    position: relative; z-index: 1;
    max-width: 720px; margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }
  header {
    text-align: center; padding: 2.5rem 0 2rem;
    border-bottom: 1px solid var(--border); margin-bottom: 2rem;
  }
  .site-icon { font-size: 2.5rem; display: block; margin-bottom: 0.75rem; }
  .site-title {
    font-family: 'Shippori Mincho', serif; font-size: 1.5rem;
    font-weight: 500; letter-spacing: 0.2em; margin-bottom: 0.3rem;
  }
  .site-sub { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.15em; }
  .page-title {
    font-family: 'Shippori Mincho', serif; font-size: 1.4rem;
    font-weight: 500; letter-spacing: 0.15em; text-align: center;
    margin-bottom: 0.75rem; padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .page-desc {
    text-align: center; font-size: 0.85rem; color: var(--muted);
    line-height: 1.8; margin-bottom: 2rem;
  }

  /* 診断CTAバナー */
  .cta-banner {
    background: linear-gradient(135deg, #1a1a2e, #2d4a6b);
    border-radius: 14px; padding: 1.25rem 1.5rem;
    text-align: center; margin-bottom: 2rem;
    text-decoration: none; display: block;
    transition: opacity 0.2s;
  }
  .cta-banner:hover { opacity: 0.9; text-decoration: none; }
  .cta-banner p { color: var(--gold-light); font-size: 0.8rem; margin-bottom: 0.3rem; }
  .cta-banner strong {
    color: var(--gold); font-family: 'Shippori Mincho', serif;
    font-size: 1rem; letter-spacing: 0.15em;
  }

  /* マガジンタブ */
  .tab-wrap {
    display: flex; flex-wrap: wrap; gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  .tab-btn {
    padding: 0.4rem 0.85rem;
    border: 1px solid var(--border);
    border-radius: 20px; background: var(--surface);
    font-size: 0.78rem; color: var(--muted);
    cursor: pointer; transition: all 0.2s;
    font-family: 'Zen Kaku Gothic New', sans-serif;
  }
  .tab-btn:hover { border-color: var(--gold); color: var(--gold); }
  .tab-btn.active {
    background: var(--gold); border-color: var(--gold);
    color: #fff; font-weight: 500;
  }

  /* 記事カード */
  .articles-wrap { min-height: 200px; }

  .magazine-title {
    font-family: 'Shippori Mincho', serif; font-size: 1rem;
    color: var(--gold); letter-spacing: 0.1em;
    margin-bottom: 1rem; padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 0.5rem;
  }

  .article-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1rem 1.25rem;
    margin-bottom: 0.75rem; display: block;
    text-decoration: none; transition: all 0.2s;
    backdrop-filter: blur(8px);
  }
  .article-card:hover {
    border-color: var(--gold); transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(201,168,76,0.15);
    text-decoration: none;
  }
  .article-title {
    font-size: 0.9rem; color: var(--ink);
    line-height: 1.6; margin-bottom: 0.3rem;
    font-weight: 400;
  }
  .article-date { font-size: 0.72rem; color: var(--muted); }
  .article-badge {
    display: inline-block; font-size: 0.65rem;
    padding: 0.15rem 0.5rem; border-radius: 10px;
    margin-left: 0.5rem; vertical-align: middle;
  }
  .badge-free { background: rgba(65,201,180,0.15); color: #41C9B4; border: 1px solid rgba(65,201,180,0.3); }
  .badge-paid { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid var(--border); }

  .loading {
    text-align: center; padding: 3rem 0;
    font-size: 0.85rem; color: var(--muted);
  }
  .loading-spinner {
    display: inline-block; width: 24px; height: 24px;
    border: 2px solid var(--border); border-top-color: var(--gold);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin-bottom: 0.75rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    text-align: center; padding: 2rem;
    font-size: 0.85rem; color: var(--muted);
  }

  a { color: var(--gold); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .back-link {
    display: block; text-align: center; margin-top: 2rem;
    font-size: 0.875rem; color: var(--muted);
  }
  .back-link a { color: var(--gold); }
  footer {
    text-align: center; padding: 2rem 0 1rem;
    border-top: 1px solid var(--border); margin-top: 3rem;
  }
  .footer-nav { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .footer-nav a { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.1em; }
  .footer-copy { font-size: 0.7rem; color: var(--muted); }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="wrap">
  <header>
    <span class="site-icon">🦦</span>
    <div class="site-title">星詠みの海獺</div>
    <div class="site-sub">九星気学 × 四柱推命</div>
  </header>

  <h1 class="page-title">鑑定レポート一覧</h1>
  <p class="page-desc">
    あなたの本命星と日干の組み合わせから<br>
    九星気学×四柱推命の詳細鑑定レポートをお読みいただけます。
  </p>

  <!-- 診断CTAバナー -->
  <a href="/" class="cta-banner">
    <p>あなたの本命星・日干がわからない方はこちら</p>
    <strong>🌟 無料診断ページへ →</strong>
  </a>

  <!-- マガジンタブ -->
  <div class="tab-wrap" id="tabs"></div>

  <!-- 記事一覧 -->
  <div class="articles-wrap" id="articles">
    <div class="loading">
      <div class="loading-spinner"></div><br>
      読み込み中…
    </div>
  </div>

  <p class="back-link"><a href="/">← 診断ページへ戻る</a></p>

  <footer>
    <nav class="footer-nav">
      <a href="/">診断トップ</a>
      <a href="/about.html">このサイトについて</a>
      <a href="/fortunes.html">鑑定一覧</a>
      <a href="/privacy.html">プライバシーポリシー</a>
      <a href="/contact.html">お問い合わせ</a>
    </nav>
    <p class="footer-copy">© 2026 星詠みの海獺 / by_nature</p>
  </footer>
</div>

<script>
  // 星アニメーション
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*5}s;--op:${0.3+Math.random()*0.5};`;
    starsEl.appendChild(s);
  }

  // マガジン定義
  const MAGAZINES = [
    { id: 'first',     name: 'まずは見てほしい記事', emoji: '📖', free: true },
    { id: 'ichihaku',  name: '一白水星×〇〇', emoji: '⭐' },
    { id: 'nikoku',    name: '二黒土星×〇〇', emoji: '⭐' },
    { id: 'sanpeki',   name: '三碧木星×〇〇', emoji: '⭐' },
    { id: 'shuroku',   name: '四緑木星×〇〇', emoji: '⭐' },
    { id: 'goko',      name: '五黄土星×〇〇', emoji: '⭐' },
    { id: 'roppaku',   name: '六白金星×〇〇', emoji: '⭐' },
    { id: 'shichiseki',name: '七赤金星×〇〇', emoji: '⭐' },
    { id: 'happaku',   name: '八白土星×〇〇', emoji: '⭐' },
    { id: 'kyushi',    name: '九紫火星×〇〇', emoji: '⭐' },
  ];

  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxVIifoRjcwuHqKP7bP5CiGd-DULfEAn5T4D6UOAxaDUW1aReloVfCjUGR3jwZvG0Gr9g/exec';
  let currentId = 'first';
  const cache = {};

  // タブ生成
  const tabsEl = document.getElementById('tabs');
  MAGAZINES.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (m.id === 'first' ? ' active' : '');
    btn.textContent = m.name;
    btn.onclick = () => selectMagazine(m.id);
    btn.id = 'tab-' + m.id;
    tabsEl.appendChild(btn);
  });

  // マガジン選択
  function selectMagazine(id) {
    currentId = id;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    loadArticles(id);
  }

  // 記事取得・表示
  function loadArticles(id) {
    if (cache[id]) { renderArticles(id, cache[id]); return; }

    const articlesEl = document.getElementById('articles');
    articlesEl.innerHTML = '<div class="loading"><div class="loading-spinner"></div><br>読み込み中…</div>';

    const callbackName = 'cb_' + id + '_' + Date.now();
    window[callbackName] = function(data) {
      document.getElementById('script-' + id)?.remove();
      if (data.status === 'success') {
        cache[id] = data;
        renderArticles(id, data);
      } else {
        articlesEl.innerHTML = '<div class="error-msg">記事の読み込みに失敗しました。<br><a href="https://note.com/by_nature" target="_blank">noteで直接ご覧ください →</a></div>';
      }
    };

    const script = document.createElement('script');
    script.id = 'script-' + id;
    script.src = `${GAS_URL}?type=magazine&id=${id}&callback=${callbackName}`;
    document.body.appendChild(script);
  }

  // 記事レンダリング
  function renderArticles(id, data) {
    const mag = MAGAZINES.find(m => m.id === id);
    const articlesEl = document.getElementById('articles');

    if (!data.articles || data.articles.length === 0) {
      articlesEl.innerHTML = '<div class="error-msg">記事が見つかりませんでした。</div>';
      return;
    }

    let html = `<div class="magazine-title">${mag.emoji} ${data.magazine}</div>`;
    data.articles.forEach(article => {
      const date = article.pubDate ? new Date(article.pubDate).toLocaleDateString('ja-JP') : '';
      const isFree = mag.free || article.title.includes('無料') || article.title.includes('まとめ');
      const badge = isFree
        ? '<span class="article-badge badge-free">無料</span>'
        : '<span class="article-badge badge-paid">有料</span>';
      html += `
        <a href="${article.link}" target="_blank" class="article-card">
          <div class="article-title">${article.title}${badge}</div>
          <div class="article-date">${date}</div>
        </a>`;
    });

    articlesEl.innerHTML = html;
  }

  // 初期ロード
  loadArticles('first');
</script>
<script src="/nav.js"></script>
</body>
</html>
