<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

     crossorigin="anonymous"></script>

<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --cream: #faf8f3;
    --muted: #6b6b7a;
    --border: rgba(201,168,76,0.25);
    --surface: rgba(255,255,255,0.7);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(201,168,76,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(201,168,76,0.06) 0%, transparent 60%);
  }

  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .star {
    position: absolute; width: 2px; height: 2px;
    background: var(--gold); border-radius: 50%; opacity: 0;
    animation: twinkle var(--d, 3s) var(--delay, 0s) infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(1); }
    50% { opacity: var(--op, 0.6); transform: scale(1.2); }
  }

  .wrap {
    position: relative; z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  header {
    text-align: center;
    padding: 2.5rem 0 2rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
  }
  .site-icon { font-size: 2.5rem; display: block; margin-bottom: 0.75rem; }
  .site-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 1.5rem; font-weight: 500;
    letter-spacing: 0.2em; color: var(--ink); margin-bottom: 0.3rem;
  }
  .site-sub { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.15em; }

  .page-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 1.4rem; font-weight: 500;
    letter-spacing: 0.15em; color: var(--ink);
    text-align: center; margin-bottom: 2rem;
    padding-bottom: 1rem; border-bottom: 1px solid var(--border);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    backdrop-filter: blur(8px);
  }

  .contact-note {
    font-size: 0.85rem; color: var(--muted);
    line-height: 1.8; margin-bottom: 2rem; text-align: center;
  }

  .field { margin-bottom: 1.5rem; }

  .field-label {
    display: block;
    font-family: 'Shippori Mincho', serif;
    font-size: 0.85rem; letter-spacing: 0.1em;
    color: var(--ink); margin-bottom: 0.5rem;
  }

  .field-label .required {
    color: var(--gold); font-size: 0.75rem; margin-left: 0.3rem;
  }

  .field input[type="text"],
  .field input[type="email"],
  .field textarea {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: rgba(255,255,255,0.8);
    color: var(--ink);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 0.9rem;
    font-weight: 300;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .field input:focus,
  .field textarea:focus {
    border-color: var(--gold);
  }

  .field textarea {
    min-height: 160px;
    resize: vertical;
    line-height: 1.7;
  }

  .checkbox-group {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    margin-top: 0.25rem;
  }

  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    cursor: pointer;
  }

  .checkbox-item input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: var(--gold);
    cursor: pointer;
  }

  .checkbox-item span {
    font-size: 0.875rem;
    color: var(--ink);
  }

  .submit-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, #1a1a2e, #2d4a6b);
    color: var(--gold-light);
    border: none;
    border-radius: 10px;
    font-family: 'Shippori Mincho', serif;
    font-size: 1rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: opacity 0.3s;
    margin-top: 0.5rem;
  }
  .submit-btn:hover { opacity: 0.85; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .divider {
    width: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 1.5rem auto;
  }

  .x-contact { text-align: center; margin-top: 1.5rem; }
  .x-contact p { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.75rem; }
  .x-btn {
    display: inline-block;
    padding: 0.6rem 1.5rem;
    background: #1a1a2e; color: #fff;
    border-radius: 24px; font-size: 0.85rem;
    letter-spacing: 0.1em; text-decoration: none;
    transition: opacity 0.2s;
  }
  .x-btn:hover { opacity: 0.8; }

  /* 送信完了画面 */
  #thanks {
    display: none;
    text-align: center;
    padding: 2rem 0;
  }
  .thanks-icon { font-size: 3rem; margin-bottom: 1rem; }
  .thanks-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 1.2rem; letter-spacing: 0.2em;
    color: var(--ink); margin-bottom: 1rem;
  }
  .thanks-msg { font-size: 0.875rem; color: var(--muted); line-height: 1.8; }

  a { color: var(--gold); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .back-link {
    display: block; text-align: center; margin-top: 2rem;
    font-size: 0.875rem; color: var(--muted); letter-spacing: 0.1em;
  }
  .back-link a { color: var(--gold); }

  footer {
    text-align: center;
    padding: 2rem 0 1rem;
    border-top: 1px solid var(--border);
    margin-top: 3rem;
  }
  .footer-nav {
    display: flex; justify-content: center;
    gap: 2rem; margin-bottom: 1rem;
  }
  .footer-nav a { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.1em; }
  .footer-copy { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="wrap">

  <header>
    <span class="site-icon">🦦</span>
    <div class="site-title">星詠みの海獺</div>
    <div class="site-sub">九星気学 × 四柱推命</div>
  </header>

  <h1 class="page-title">お問い合わせ</h1>

  <div class="card">
    <p class="contact-note">
      ご質問・ご意見・不具合のご報告などお気軽にどうぞ。<br>
      お返事まで数日いただく場合がございます。
    </p>

    <!-- お問い合わせフォーム -->
    <div id="form-area">
      <div class="field">
        <label class="field-label">お名前<span class="required">*</span></label>
        <input type="text" id="name" placeholder="例：ラッコ太郎">
      </div>

      <div class="field">
        <label class="field-label">メールアドレス<span class="required">*</span></label>
        <input type="email" id="email" placeholder="例：example@email.com">
      </div>

      <div class="field">
        <label class="field-label">お問い合わせ種別</label>
        <div class="checkbox-group">
          <label class="checkbox-item">
            <input type="checkbox" value="X"> <span>X（Twitter）について</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" value="note"> <span>noteについて</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" value="診断ページ"> <span>診断ページについて</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" value="その他"> <span>その他</span>
          </label>
        </div>
      </div>

      <div class="field">
        <label class="field-label">お問い合わせ内容<span class="required">*</span></label>
        <textarea id="message" placeholder="お問い合わせ内容をご記入ください"></textarea>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="submitForm()">
        送信する ✦
      </button>
    </div>

    <!-- 送信完了 -->
    <div id="thanks">
      <div class="thanks-icon">🦦</div>
      <div class="thanks-title">送信完了しました</div>
      <p class="thanks-msg">
        お問い合わせありがとうございます。<br>
        内容を確認の上、数日以内にご返信いたします。
      </p>
    </div>

    <div class="divider"></div>

    <div class="x-contact">
      <p>XのDMからもお問い合わせいただけます</p>
      <a href="https://x.com/By_______Nature" target="_blank" class="x-btn">
        🦦 X（Twitter）でDMを送る
      </a>
    </div>
  </div>

  <p class="back-link"><a href="/">← 診断ページへ戻る</a></p>

  <footer>
    <nav class="footer-nav">
      <a href="/">診断トップ</a>
      <a href="/privacy.html">プライバシーポリシー</a>
      <a href="/contact.html">お問い合わせ</a>
    </nav>
    <p class="footer-copy">© 2026 星詠みの海獺 / by_nature</p>
  </footer>

</div>

<script>
  // 星のアニメーション
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --d:${2+Math.random()*4}s;
      --delay:${Math.random()*5}s;
      --op:${0.3+Math.random()*0.5};
    `;
    starsEl.appendChild(s);
  }

  // フォーム送信
  const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSeObWI2GBbGmhm4b75Y4RMt2ROBZ6DekAnYhha1c3SZvxUe6A/formResponse';

  function submitForm() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const message = document.getElementById('message').value.trim();
    const checks = document.querySelectorAll('.checkbox-group input:checked');
    const categories = Array.from(checks).map(c => c.value);

    // バリデーション
    if (!name) { alert('お名前を入力してください'); return; }
    if (!email || !email.includes('@')) { alert('正しいメールアドレスを入力してください'); return; }
    if (!message) { alert('お問い合わせ内容を入力してください'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '送信中…';

    // Google フォームに送信
    const formData = new FormData();
    formData.append('entry.1380200848', name);
    formData.append('entry.892219919', email);
    categories.forEach(cat => formData.append('entry.1873188304', cat));
    formData.append('entry.385978541', message);

    fetch(FORM_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: formData
    }).then(() => {
      document.getElementById('form-area').style.display = 'none';
      document.getElementById('thanks').style.display = 'block';
    }).catch(() => {
      document.getElementById('form-area').style.display = 'none';
      document.getElementById('thanks').style.display = 'block';
    });
  }
</script>

</body>
</html>
